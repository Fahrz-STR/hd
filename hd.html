<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PHOTO ENHANCER | Powered by Replicate</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #090d16;
            --card: #111827;
            --accent: #00f0ff;
            --text: #f8fafc;
            --text-muted: #64748b;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .upload-box {
            border: 2px dashed rgba(0, 240, 255, 0.3);
            border-radius: 12px;
            padding: 2rem;
            cursor: pointer;
            background: rgba(0, 240, 255, 0.02);
            transition: 0.3s;
            margin-bottom: 1.5rem;
        }

        .upload-box:hover {
            border-color: var(--accent);
            background: rgba(0, 240, 255, 0.05);
        }

        .upload-box i {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        #file-input { display: none; }

        .preview-container {
            display: none;
            margin-bottom: 1.5rem;
        }

        .preview-container img {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .loader {
            display: none;
            margin: 1.5rem 0;
            color: var(--accent);
            font-size: 0.9rem;
        }

        .loader i {
            animation: spin 1s linear infinite;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI PHOTO ENHANCER</h1>
        <p>Ubah foto buram lu jadi super tajam & HD otomatis via Replicate AI.</p>

        <div class="upload-box" id="dropzone" onclick="document.getElementById('file-input').click()">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <h3 id="upload-text">Pilih atau Seret Foto</h3>
            <span style="font-size: 0.75rem; color: var(--text-muted);">Format: JPG, PNG (Maks 5MB)</span>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div class="preview-container" id="preview-box">
            <img src="" id="image-preview" alt="Preview">
        </div>

        <div class="loader" id="loader-status">
            <i class="fa-solid fa-circle-notch"></i>
            <p id="loader-text">Mengirim gambar ke Replicate AI...</p>
        </div>

        <button class="btn" id="enhance-btn" disabled>
            <i class="fa-solid fa-wand-magic-sparkles"></i> Proses Jadi HD
        </button>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const uploadText = document.getElementById('upload-text');
        const previewBox = document.getElementById('preview-box');
        const imagePreview = document.getElementById('image-preview');
        const enhanceBtn = document.getElementById('enhance-btn');
        const loaderStatus = document.getElementById('loader-status');
        const loaderText = document.getElementById('loader-text');

        let base64Image = null;

        // 1. Membaca file gambar lokal dan mengubahnya ke format data URL
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                uploadText.innerText = file.name;
                const reader = new FileReader();
                reader.onload = function(event) {
                    imagePreview.src = event.target.result;
                    base64Image = event.target.result; 
                    previewBox.style.display = 'block';
                    enhanceBtn.disabled = false;
                }
                reader.readAsDataURL(file);
            }
        });

        // 2. Eksekusi Jembatan API Replicate
        enhanceBtn.addEventListener('click', async function() {
            if (!base64Image) return;

            loaderStatus.style.display = 'block';
            enhanceBtn.style.display = 'none';
            previewBox.style.display = 'none';
            loaderText.innerText = "Membuat tugas di server Replicate...";

            // 🔴 PASTE API REPLICATE YANG TADI LU COPY DI SINI 🔴
            const REPLICATE_API_TOKEN = 'r8_B0tRyfC7UKyIZTREzsvAShdnl94Q9zR3du8PM'; 

            try {
                // Langkah A: Request ke Replicate untuk membuat proses antrean (Prediction)
                // Menggunakan model 'sczhou/codeformer' (Penjernih wajah dan foto terbaik di Replicate)
                const response = await fetch('https://api.replicate.com/v1/predictions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Token ${REPLICATE_API_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        version: "7de2ac1454e616a11719699003a6616bde31648a9aa000b1bda32605336292e7", 
                        input: {
                            image: base64Image,
                            codeformer_fidelity: 0.7,
                            background_enhance: true,
                            face_upsample: true,
                            upscale: 2
                        }
                    })
                });

                let data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'Token salah atau limit gratis habis');

                const predictionId = data.id;
                let status = data.status;
                let resultUrl = null;

                // Langkah B: Polling loop (Ngecek status pengerjaan AI tiap 2 detik)
                while (status !== 'succeeded' && status !== 'failed') {
                    loaderText.innerText = `AI sedang memproses gambar... (Status: ${status})`;
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    const checkResponse = await fetch(`https://api.replicate.com/v1/predictions/${predictionId}`, {
                        headers: { 'Authorization': `Token ${REPLICATE_API_TOKEN}` }
                    });
                    const checkData = await checkResponse.json();
                    status = checkData.status;
                    
                    if (status === 'succeeded') {
                        resultUrl = checkData.output;
                    } else if (status === 'failed') {
                        throw new Error('AI gagal memproses atau format foto ditolak.');
                    }
                }

                // Langkah C: Menampilkan hasil akhir
                imagePreview.src = resultUrl;
                previewBox.style.display = 'block';
                
                enhanceBtn.innerHTML = '<i class="fa-solid fa-download"></i> Download Foto HD';
                enhanceBtn.style.backgroundColor = '#2563eb';
                enhanceBtn.style.color = '#fff';
                enhanceBtn.style.display = 'flex';
                enhanceBtn.disabled = false;

                // Aksi saat tombol berubah jadi download
                enhanceBtn.onclick = function() {
                    const a = document.createElement('a');
                    a.href = resultUrl;
                    a.download = 'Fahri_AI_Enhanced.png';
                    a.target = '_blank';
                    a.click();
                };

            } catch (error) {
                alert('Eror Sistem: ' + error.message);
                previewBox.style.display = 'block';
                enhanceBtn.style.display = 'flex';
            } finally {
                loaderStatus.style.display = 'none';
            }
        });
    </script>
</body>
</html>
